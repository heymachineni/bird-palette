name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build:hosting
        env:
          NEXT_PUBLIC_APP_URL: https://nature-colorpalette.web.app
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: nature-colorpalette
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: nature-colorpalette.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: nature-colorpalette.firebasestorage.app

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0.9.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NATURE_COLORPALETTE }}
          projectId: nature-colorpalette
          channelId: live
