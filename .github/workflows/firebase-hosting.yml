name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build static site
        run: npm run build:hosting
        env:
          NEXT_PUBLIC_APP_URL: https://nature-colorpalette.web.app
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: nature-colorpalette
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: nature-colorpalette.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: nature-colorpalette.firebasestorage.app

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NATURE_COLORPALETTE }}
        run: |
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT" > "${RUNNER_TEMP}/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="${RUNNER_TEMP}/firebase-sa.json"
          npx firebase-tools@13.29.1 deploy --only hosting --project nature-colorpalette --non-interactive
