name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Cloud Functions dependencies
        run: npm install --prefix functions --no-audit --no-fund

      - name: Build static site
        run: npm run build:hosting
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          USE_JSON_DATA: "true"
          NEXT_PUBLIC_APP_URL: https://birdpalette.web.app
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyAHNySGX5z58wHeoZCZ15T93JlVyUHqRcw
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: birdpalette.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: birdpalette
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: birdpalette.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "663802930123"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:663802930123:web:a455bfbcff6083eb9ccc4e"
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-M0JD378BY8

      - name: Verify build output
        run: |
          test -f out/index.html
          echo "Static files:" && find out -maxdepth 2 -type f | head -20
          echo "Total files:" && find out -type f | wc -l

      - name: Deploy Firebase Hosting and photo proxy
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NATURE_COLORPALETTE }}
        run: |
          SA_FILE="${RUNNER_TEMP}/firebase-sa.json"
          node -e "require('fs').writeFileSync(process.argv[1], process.env.FIREBASE_SERVICE_ACCOUNT)" "$SA_FILE"
          node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$SA_FILE"
          export GOOGLE_APPLICATION_CREDENTIALS="$SA_FILE"
          npx firebase deploy --only hosting,functions:photoSample --project birdpalette --non-interactive
